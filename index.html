<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Northbridge Medical Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="./styles.css" rel="stylesheet" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-left">
          <button class="btn btn-sm btn-outline-light me-2 d-md-none" id="sidebarToggle" type="button" aria-label="Toggle navigation">
            <i class="bi bi-list"></i>
          </button>
          <div class="brand">
            <span class="brand-title">Northbridge Medical Clinic</span>
          </div>
        </div>
        <div class="topbar-right">
          <div class="topbar-meta d-none d-sm-flex flex-column align-items-end">
            <span class="text-white-75 small">Same-day appointments</span>
            <span class="topbar-phone fw-semibold">+63 (02) 555 0123</span>
          </div>
        </div>
      </header>

      <div class="main">
        <aside class="sidebar" id="sidebar">
          <nav class="nav flex-column py-2">
            <a class="nav-link" href="#/dashboard"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
            <div class="nav-section px-3 mt-2 mb-1 text-uppercase small text-white-50">Masters</div>
            <a class="nav-link" href="#/patients"><i class="bi bi-people me-2"></i>Patient Details</a>
            <a class="nav-link" href="#/doctors"><i class="bi bi-person-badge me-2"></i>Doctor Details</a>
            <a class="nav-link" href="#/appointments"><i class="bi bi-calendar2-check me-2"></i>Appointments</a>
            <a class="nav-link" href="#/reports"><i class="bi bi-graph-up me-2"></i>Reports</a>
          </nav>
        </aside>

        <main class="content">
          <div class="container-fluid py-3">
            <div id="alertHost"></div>
            <div id="view"></div>

            <footer class="app-footer mt-4">
              <div class="text-muted small">Copyright © 2026. All rights reserved.</div>
              <div class="text-muted small">Version 0.1 (static HTML/JS)</div>
            </footer>
          </div>
        </main>
      </div>
    </div>

    <div class="modal fade" id="crudModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="crudModalTitle">Edit</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="crudModalBody"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="crudModalSave">Save</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
