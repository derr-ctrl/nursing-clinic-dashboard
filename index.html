<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Northbridge Clinic – Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="./styles.css" rel="stylesheet" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-left">
          <button class="btn btn-icon d-md-none me-2" id="sidebarToggle" type="button" aria-label="Toggle menu"><i class="bi bi-list"></i></button>
          <div class="brand">
            <span class="brand-title">Northbridge Clinic</span>
          </div>
          <div class="topbar-search">
            <i class="bi bi-search topbar-search-icon"></i>
            <input type="text" class="form-control topbar-search-input" placeholder="Search..." id="headerSearch" />
          </div>
        </div>
        <div class="topbar-right">
          <span class="topbar-datetime text-muted small" id="headerDateTime"></span>
          <button type="button" class="btn btn-icon" aria-label="Notifications"><i class="bi bi-bell"></i><span class="badge-dot"></span></button>
          <button type="button" class="btn btn-icon" aria-label="Messages"><i class="bi bi-envelope"></i><span class="badge-dot"></span></button>
          <div class="user-avatar" title="Profile"><i class="bi bi-person-fill"></i></div>
        </div>
      </header>

      <div class="main">
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-brand">Northbridge</div>
          <nav class="nav flex-column py-2">
            <a class="nav-link" href="#/dashboard"><i class="bi bi-grid me-2"></i>Dashboard</a>
            <a class="nav-link" href="#/patients"><i class="bi bi-people me-2"></i>Patients</a>
            <a class="nav-link" href="#/doctors"><i class="bi bi-person-badge me-2"></i>Doctors</a>
            <a class="nav-link" href="#/appointments"><i class="bi bi-calendar2-week me-2"></i>Scheduling</a>
            <a class="nav-link" href="#/reports"><i class="bi bi-bar-chart me-2"></i>Reports</a>
            <a class="nav-link" href="#/messages"><i class="bi bi-chat-dots me-2"></i>Messages</a>
            <div class="sidebar-divider"></div>
            <a class="nav-link" href="#/settings"><i class="bi bi-gear me-2"></i>Settings</a>
            <a class="nav-link" href="#/" id="navLogout"><i class="bi bi-box-arrow-right me-2"></i>Log Out</a>
          </nav>
        </aside>

        <main class="content">
          <div class="container-fluid py-3">
            <div id="alertHost"></div>
            <div id="view"></div>

            <footer class="app-footer mt-4">
              <div class="text-muted small">Copyright © 2026. All rights reserved.</div>
              <div class="text-muted small">Version 0.1 (static HTML/JS)</div>
            </footer>
          </div>
        </main>
      </div>
    </div>

    <div class="modal fade" id="crudModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="crudModalTitle">Edit</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="crudModalBody"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="crudModalSave">Save</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
